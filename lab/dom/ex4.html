<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 4 - JavaScript Lab</title>
    <style>
      :root {
        --font-main: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --color-bg: #ffffff;
        --color-text: #1f2328;
        --color-border: #d0d7de;
        --color-accent: #0969da;
        --color-muted: #6e7781;
        --color-demo-bg: #f6f8fa;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        line-height: 1.5;
        color: var(--color-text);
        background-color: var(--color-bg);
        padding: 2rem;
        max-width: 800px;
        margin: 0 auto;
      }

      .lab-header {
        border-bottom: 1px solid var(--color-border);
        padding-bottom: 1.5rem;
        margin-bottom: 2rem;
      }

      .lab-title {
        font-size: 1.75rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .concept-pill {
        display: inline-block;
        background: var(--color-demo-bg);
        border: 1px solid var(--color-border);
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        margin-right: 0.4rem;
      }

      .demo-container {
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1.5rem;
      }

      .controls {
        margin-bottom: 1.5rem;
      }

      .btn-update {
        background-color: var(--color-accent);
        color: white;
        border: 1px solid rgba(27, 31, 36, 0.15);
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
      }

      .btn-update:hover {
        background-color: #0860ca;
      }

      .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }

      .item {
        padding: 1rem;
        background: white;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        font-weight: 500;
        text-align: center;
        transition: all 0.3s ease;
      }

      .item.updated {
        border-color: var(--color-accent);
        color: var(--color-accent);
        background: #f0f7ff;
      }
    </style>
  </head>
  <body>
    <header class="lab-header">
      <h1 class="lab-title">Iteração com querySelectorAll</h1>
      <p style="margin-bottom: 1rem">
        Atualização em massa de múltiplos elementos selecionados por classe.
      </p>
      <div>
        <span class="concept-pill">querySelectorAll</span>
        <span class="concept-pill">forEach</span>
        <span class="concept-pill">NodeList</span>
      </div>
    </header>

    <main>
      <section class="demo-container">
        <div class="controls">
          <button id="mudar" class="btn-update">
            Atualizar Conteúdo dos Itens
          </button>
        </div>

        <div class="items-grid">
          <div class="item">Conteúdo Original A</div>
          <div class="item">Conteúdo Original B</div>
          <div class="item">Conteúdo Original C</div>
          <div class="item">Conteúdo Original D</div>
        </div>
      </section>
    </main>

    <script>
      const paragrafos = document.querySelectorAll(".item");
      const botao4 = document.getElementById("mudar");

      //interação com js//
      botao4.addEventListener("click", () => {
        paragrafos.forEach(function (paragrafos) {
          paragrafos.textContent = "Guilherme Jorge de Araujo";
        });
      });
    </script>
  </body>
</html>
