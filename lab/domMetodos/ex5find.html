<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta property="og:description" content="">
    <meta name="twitter:description" content="">
    <title>Exercício 2 Find - JavaScript Lab</title>
    <style>
        :root {
            --font-main: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            --color-bg: #ffffff;
            --color-text: #1a1f23;
            --color-border: #d0d7de;
            --color-accent: #0969da;
            --color-error: #cf222e;
            --color-secondary-bg: #f6f8fa;
            --radius: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            line-height: 1.6;
            color: var(--color-text);
            background-color: var(--color-bg);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .lab-header {
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .lab-title {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .concept-pills {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .pill {
            background: var(--color-secondary-bg);
            border: 1px solid var(--color-border);
            padding: 2px 10px;
            border-radius: 20px;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.8rem;
            color: #475467;
        }

        .demo-sandbox {
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 2rem;
            background: #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .form-layout {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            max-width: 450px;
        }

        .field-label {
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .text-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 1rem;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }

        .btn-execute {
            background-color: var(--color-accent);
            color: white;
            border: 1px solid rgba(27, 31, 36, 0.15);
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn-execute:hover { filter: brightness(1.1); }

        .result-panel {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-left: 4px solid var(--color-border);
            border-radius: 0 var(--radius) var(--radius) 0;
            min-height: 50px;
        }

        #p {
            font-weight: 500;
            color: #24292f;
        }

        .tech-note {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #57606a;
            padding: 1rem;
            background: var(--color-secondary-bg);
            border-radius: var(--radius);
        }
    </style>
</head>
<body>
    <button id="language-switcher" type="button" style="position:fixed;top:1rem;right:1rem;z-index:20;background:#0969da;color:#fff;border:1px solid #fff;border-radius:999px;padding:0.6rem 0.9rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">EN</button>
    <header class="lab-header">
        <h1 class="lab-title" data-i18n="exercises.find2.title">Busca Condicional com find()</h1>
        <p data-i18n="exercises.find2.description">Identificação do primeiro valor acima de um limite e tratamento de resultados nulos.</p>
        <div class="concept-pills">
            <span class="pill">Array.find()</span>
            <span class="pill">Conditional Logic</span>
            <span class="pill">undefined handling</span>
            <span class="pill">map(Number)</span>
        </div>
    </header>

    <main>
        <section class="demo-sandbox">
            <div class="form-layout">
                <div>
                    <label class="field-label" for="num" data-i18n="exercises.find2.label">Insira uma lista de números (por vírgula):</label>
                    <input type="text" oninput="this.value = this.value.replace(/[^0-9]/g, '')" id="num" class="text-input" data-i18n-placeholder="exercises.find2.placeholder" placeholder="Ex: 50, 80, 120, 30">
                </div>
                <button id="botao" class="btn-execute" data-i18n="exercises.find2.button">Verificar Valores > 100</button>
            </div>

            <div class="result-panel" aria-live="polite">
                <p id="p" data-i18n="exercises.find2.resultInitial">Aguardando entrada de dados...</p>
            </div>
        </section>
    </main>

    <script src="../../i18n.js"></script>
    <script>
        const input = document.getElementById("num");
        const botao = document.getElementById("botao");
        const p = document.getElementById("p");

        botao.addEventListener("click", function () {
            const dStringPArray = input.value.split(",").map(Number);
            const analiseInput = dStringPArray.find((i) => i > 100);
            
            if (analiseInput === undefined) {
                p.textContent = t("exercises.find2.noValueResult");
            } else {
                p.textContent = t("exercises.find2.valueResult", { value: analiseInput });
            }
        });
    </script>
</body>
</html>
