<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="">
    <meta property="og:description" content="">
    <meta name="twitter:description" content="">
    <title>Exercício 2 Filter - JavaScript Lab</title>
    <style>
      :root {
        --font-main: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --color-bg: #ffffff;
        --color-text: #1a1f23;
        --color-border: #d0d7de;
        --color-accent: #0969da;
        --color-secondary-bg: #f6f8fa;
        --radius: 6px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        line-height: 1.6;
        color: var(--color-text);
        background-color: var(--color-bg);
        padding: 2rem;
        max-width: 800px;
        margin: 0 auto;
      }

      .lab-header {
        border-bottom: 1px solid var(--color-border);
        padding-bottom: 1.5rem;
        margin-bottom: 2rem;
      }

      .lab-title {
        font-size: 1.85rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .concept-group {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }

      .badge {
        background: var(--color-secondary-bg);
        border: 1px solid var(--color-border);
        padding: 0.2rem 0.6rem;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        color: #475467;
      }

      .demo-container {
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 2rem;
        background: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .input-stack {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 450px;
      }

      .input-label {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .input-text {
        padding: 0.75rem;
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        font-size: 1rem;
        transition: border-color 0.2s;
      }

      .input-text:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
      }

      .btn-submit {
        background-color: var(--color-accent);
        color: white;
        border: 1px solid rgba(27, 31, 36, 0.15);
        padding: 0.75rem 1.25rem;
        font-size: 0.9rem;
        font-weight: 600;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-submit:hover {
        background-color: #0860ca;
      }

      .result-box {
        margin-top: 2rem;
        padding: 1.25rem;
        background-color: #f0f7ff;
        border-left: 4px solid var(--color-accent);
        border-radius: 0 var(--radius) var(--radius) 0;
        min-height: 60px;
      }

      #p2 {
        font-weight: 500;
        color: #053d7a;
      }
    </style>
  </head>
  <body>
    <button id="language-switcher" type="button" style="position:fixed;top:1rem;right:1rem;z-index:20;background:#0969da;color:#fff;border:1px solid #fff;border-radius:999px;padding:0.6rem 0.9rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);">EN</button>
    <header class="lab-header">
      <h1 class="lab-title" data-i18n="exercises.filter2.title">Processamento Numérico com filter()</h1>
      <p data-i18n="exercises.filter2.description">
        Conversão de tipos e aplicação de filtros lógicos em arrays numéricos.
      </p>
      <div class="concept-group">
        <span class="badge">map(Number)</span>
        <span class="badge">filter()</span>
        <span class="badge">split()</span>
        <span class="badge">join()</span>
      </div>
    </header>

    <main>
      <section class="demo-container">
        <div class="input-stack">
          <label class="input-label" for="valores" data-i18n="exercises.filter2.label">Insira números (separados por vírgula):</label>
          <input
            type="text"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            id="valores"
            class="input-text"
            data-i18n-placeholder="exercises.filter2.placeholder"
            placeholder="Ex: 5, 8.5, 10, 6, 7"
          />
          <button id="botao2" class="btn-submit" data-i18n="exercises.filter2.button">Filtrar Valores (>= 7)</button>
        </div>

        <div class="result-box" aria-live="polite">
          <p id="p2" data-i18n="exercises.filter2.resultInitial">Aguardando entrada de dados...</p>
        </div>
      </section>
    </main>

    <script src="../../i18n.js"></script>
    <script>
      const input1 = document.getElementById("valores");
      const botao2 = document.getElementById("botao2");
      const p2 = document.getElementById("p2");

      botao2.addEventListener("click", function () {
        const pegarDados = input1.value.split(",").map(Number);
        const analiseDosDados = pegarDados.filter((numeros) => numeros >= 7);
        p2.textContent = t("exercises.filter2.resultMessage", { values: analiseDosDados.join(", ") });
      });
    </script>
  </body>
</html>
